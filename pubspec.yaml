name: turf11
description: Turf11 - Cricket Booking App
publish_to: 'none'
version: 1.0.1+12

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  # Icons (FIXED ✅)
  lucide_icons: ^0.257.0
  # State Management
  provider: ^6.1.2
  # Navigation
  go_router: ^13.2.0
  # UI Helpers
  smooth_page_indicator: ^1.1.0
  firebase_core: ^2.30.0
  # Date Formatting
  intl: ^0.19.0
  change_app_package_name: ^1.5.0
  shared_preferences: ^2.5.5
  get: ^4.6.6
  dio: ^5.4.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  razorpay_flutter: ^1.4.4
  share_plus: ^11.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  # Optional Assets (you can use later)
  assets:
    - assets/images/
