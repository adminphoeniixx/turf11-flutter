name: turf11
description: Turf11 - Cricket Booking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Icons (FIXED ✅)
  lucide_icons: ^0.257.0

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.0

  # UI Helpers
  smooth_page_indicator: ^1.1.0
  firebase_core: ^2.30.0

  # Date Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Optional Assets (you can use later)
  assets:
    - assets/images/